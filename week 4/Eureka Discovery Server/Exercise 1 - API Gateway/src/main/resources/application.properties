# API Gateway Server Port
server.port=9090

# Application Name for Eureka Registration
spring.application.name=api-gateway

# Eureka Client Configuration
# This tells the API Gateway where to find your Eureka server
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

# Spring Cloud Gateway Routes
# Enables automatic routing based on service IDs in Eureka
spring.cloud.gateway.discovery.locator.enabled=true

# Ensures service IDs are converted to lowercase for routing consistency
# Make sure the comment is on a separate line or removed, as we discussed previously
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Example: Explicit Route to Account Service
# This route will forward requests from /accounts/** to the account-service registered in Eureka
spring.cloud.gateway.routes[0].id=account_route
spring.cloud.gateway.routes[0].uri=lb://account-service 
# 'lb://' means load-balanced via Eureka
spring.cloud.gateway.routes[0].predicates[0]=Path=/accounts/**