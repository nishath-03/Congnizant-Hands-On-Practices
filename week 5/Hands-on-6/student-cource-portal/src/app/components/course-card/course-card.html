<div class="card">
  <h3>{{ course.name }}</h3>
  <p>Code: {{ course.code }}</p>
  <p>Credits: {{ course.credits }}</p>
  <p>Status: {{ course.gradeStatus }}</p>
  <a [routerLink]="['/courses', course.id]">View Details</a>
  <button (click)="toggleEnroll()">
    {{ enrollmentService.isEnrolled(course.id) ? 'Unenroll' : 'Enroll' }}
  </button>
</div>
