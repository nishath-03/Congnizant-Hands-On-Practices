<div class="detail-container">
  <a routerLink="/courses">← Back to Courses</a>

  <div *ngIf="course" class="detail-card">
    <h2>{{ course.name }}</h2>
    <p><strong>Loaded Route Param ID:</strong> {{ course.id }}</p>
    <p><strong>Course Code:</strong> {{ course.code }}</p>
    <p><strong>Credits:</strong> {{ course.credits }}</p>
    <p><strong>Grade Status:</strong> {{ course.gradeStatus }}</p>
  </div>

  <div *ngIf="!course" class="not-found-box">
    <p>Course not found for specified ID.</p>
  </div>
</div>
