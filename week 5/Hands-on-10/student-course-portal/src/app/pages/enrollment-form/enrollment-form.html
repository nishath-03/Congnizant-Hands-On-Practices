<div class="form-container">
  <h2>Student Enrollment Request</h2>

  <div class="success-message" *ngIf="submitted">
    Enrollment request submitted successfully!
  </div>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

    <div class="form-group">
      <label>Student Name</label>
      <input
        type="text"
        name="studentName"
        [(ngModel)]="studentName"
        #nameCtrl="ngModel"
        required
        minlength="3"
      />
      <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">Name is required</span>
      <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">Name must be at least 3 characters</span>
    </div>

    <div class="form-group">
      <label>Student Email</label>
      <input
        type="email"
        name="studentEmail"
        [(ngModel)]="studentEmail"
        #emailCtrl="ngModel"
        required
        email
      />
      <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">Email is required</span>
      <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">Enter a valid email</span>
    </div>

    <div class="form-group">
      <label>Course ID</label>
      <input
        type="number"
        name="courseId"
        [(ngModel)]="courseId"
        #courseCtrl="ngModel"
        required
      />
      <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">Course ID is required</span>
    </div>

    <div class="form-group">
      <label>Preferred Semester</label>
      <select
        name="preferredSemester"
        [(ngModel)]="preferredSemester"
        #semesterCtrl="ngModel"
        required
      >
        <option value="">-- Select --</option>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
      <span *ngIf="semesterCtrl.touched && semesterCtrl.errors?.['required']">Semester is required</span>
    </div>

    <div class="form-group checkbox-group">
      <label>
        <input
          type="checkbox"
          name="agreeToTerms"
          [(ngModel)]="agreeToTerms"
          #termsCtrl="ngModel"
          required
        />
        I agree to the terms
      </label>
      <span *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">You must agree to the terms</span>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
      <button type="button" (click)="enrollForm.resetForm(); submitted = false">Reset</button>
    </div>

  </form>
</div>
