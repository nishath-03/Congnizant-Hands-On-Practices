<div class="course-list-container">
  <h2>Course Listing (API Backend Connected)</h2>

  <!-- Step 91: Loading spinner bound to loadingService.isLoading$ async pipe -->
  <div *ngIf="loadingService.isLoading$ | async" class="loading-spinner">
    ⌛ Loading data from API...
  </div>

  <!-- Step 84: Error message banner on HTTP failure -->
  <div *ngIf="errorMessage" class="error-banner">
    ⚠️ {{ errorMessage }}
  </div>

  <div class="search-row">
    <input type="text" [(ngModel)]="searchTerm" placeholder="Search courses..." />
    <button (click)="onSearch()">Search</button>
  </div>

  <p *ngIf="searchTerm" class="search-info">
    Current URL Query Parameter (search): <strong>{{ searchTerm }}</strong>
  </p>

  <div class="course-grid">
    <div *ngFor="let course of courses" class="course-wrapper">
      <app-course-card [course]="course"></app-course-card>
      <div class="card-actions">
        <button (click)="selectCourseForStudents(course.id)">Load Students (switchMap)</button>
        <button (click)="deleteCourse(course.id)" class="delete-btn">DELETE</button>
      </div>
    </div>
  </div>

  <!-- Step 87: switchMap output display -->
  <div *ngIf="selectedCourseId" class="switchmap-students-box">
    <h3>Enrolled Students for Course ID {{ selectedCourseId }} (via switchMap):</h3>
    <p *ngIf="selectedCourseStudents.length === 0">No students found for this course.</p>
    <ul>
      <li *ngFor="let s of selectedCourseStudents">{{ s.name }} (Student ID: {{ s.id }})</li>
    </ul>
  </div>
</div>
