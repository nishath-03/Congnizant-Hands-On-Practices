<app-notification></app-notification>

<div class="home-container">
  <h1>Welcome to {{ portalName }}</h1>
  <p>This portal helps students manage courses and view profile details.</p>

  <div class="stats-row">
    <div class="stat-card">
      <h3>Courses Available</h3>
      <p>{{ courseCount }}</p>
    </div>
    <div class="stat-card">
      <h3>Enrolled</h3>
      <p>3</p>
    </div>
    <div class="stat-card">
      <h3>GPA</h3>
      <p>3.8</p>
    </div>
  </div>

  <app-course-summary-widget></app-course-summary-widget>

  <div class="actions-section">
    <button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
    <p class="message" *ngIf="message">{{ message }}</p>
  </div>

  <div class="search-section">
    <input type="text" [(ngModel)]="searchTerm" placeholder="Search courses..." />
    <p>Searching for: {{ searchTerm }}</p>
  </div>
</div>
